<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siirwa Millers - Contact</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">Siirwa Millers</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="About.html">About Us</a></li>
                    <li class="nav-item"><a class="nav-link" href="Products.html">Our Products</a></li>
                    <li class="nav-item"><a class="nav-link" href="wholesale.html">Wholesale</a></li>
                    <li class="nav-item"><a class="nav-link active" href="Contact.html">Contact</a></li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="container my-5">
        <div class="p-5 bg-white rounded shadow-sm max-width-600 mx-auto">
            <h2 class="fw-bold mb-4">Get In Touch</h2>
            <form>
                <div class="mb-3">
                    <label class="form-label">Name</label>
                    <input type="text" class="form-control" placeholder="Your Name">
                </div>
                <div class="mb-3">
                    <label class="form-label">Email address</label>
                    <input type="email" class="form-control" placeholder="name@example.com">
                </div>
                <div class="mb-3">
                    <label class="form-label">Message</label>
                    <textarea class="form-control" rows="3"></textarea>
                </div>
                <button type="submit" class="btn btn-dark w-100">Send Message</button>
            </form>
        </div>
    </div>
    <script>
        document.getElementById('contactForm').addEventListener('submit', function(event) {
            // Stop the form from refreshing the page automatically
            event.preventDefault();

            // Store form inputs into variables using DOM methods
            let nameValue = document.getElementById('userName').value;
            let emailValue = document.getElementById('userEmail').value;
            let messageValue = document.getElementById('userMessage').value;
            let alertContainer = document.getElementById('feedbackAlert');

            // Standard conditional logic from your lecture slides
            if (nameValue === "" || emailValue === "" || messageValue === "") {
                // If any field is empty, inject a red error warning alert
                alertContainer.innerHTML = '<div class="alert alert-danger fw-medium">Please fill out all fields before submitting the form.</div>';
            } else {
                // If all fields are valid, inject a green success alert
                alertContainer.innerHTML = '<div class="alert alert-success fw-medium">Thank you! Your message was sent successfully.</div>';
                
                // Clear the input fields completely after successful submission
                document.getElementById('contactForm').reset();
            }
        });
    </script>
</body>
</html>
